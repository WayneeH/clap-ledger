<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clap 記帳本</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #6b6b66;
    --text3: #9e9e97;
    --accent: #ff4a00;
    --accent-bg: #fff2ee;
    --accent-text: #c43600;
    --danger: #c0392b;
    --danger-bg: #fdf0ee;
    --warning: #b45309;
    --warning-bg: #fef3e2;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #17171a;
      --surface: #222226;
      --surface2: #2a2a2f;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --text: #ededea;
      --text2: #9a9a94;
      --text3: #5e5e5a;
      --accent: #ff6a30;
      --accent-bg: #2e1a10;
      --accent-text: #ff9070;
      --danger: #e05c4a;
      --danger-bg: #2e1a19;
      --warning: #f59e0b;
      --warning-bg: #2e2110;
    }
  }

  body {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-inner {
    max-width: 720px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 16px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: -0.3px;
  }

  

  .header-actions { display: flex; gap: 8px; }

  .main { max-width: 720px; margin: 0 auto; padding: 1.5rem; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 2px;
    background: var(--surface2);
    border-radius: var(--radius);
    padding: 4px;
    margin-bottom: 1.5rem;
  }

  .tab {
    flex: 1;
    padding: 8px 4px;
    font-size: 13px;
    font-weight: 500;
    text-align: center;
    cursor: pointer;
    border-radius: var(--radius-sm);
    color: var(--text2);
    transition: all .15s;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  

  .tab.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow);
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1rem;
  }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  

  /* Stats */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    text-align: center;
  }

  .stat-label { font-size: 12px; color: var(--text3); margin-bottom: 4px; }
  .stat-value { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; color: var(--text); }

  /* Form */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 13px; color: var(--text2); margin-bottom: 5px; display: block; font-weight: 500; }

  input[type=text], input[type=date], input[type=number], select, textarea {
    width: 100%;
    padding: 9px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color .15s;
    appearance: none;
    -webkit-appearance: none;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    background: var(--surface);
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* Chips */
  .chips { display: flex; flex-wrap: wrap; gap: 7px; }

  .chip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 11px;
    border: 1px solid var(--border2);
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    user-select: none;
    color: var(--text2);
    transition: all .12s;
    background: var(--surface2);
  }

  .chip.active {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent-text);
    font-weight: 500;
  }

  

  /* Buttons */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    transition: all .12s;
  }

  .btn:hover { background: var(--surface2); }
  .btn:active { transform: scale(0.98); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .btn-primary:hover { opacity: .88; background: var(--accent); }

  .btn-sm {
    padding: 5px 11px;
    font-size: 12px;
    border-radius: var(--radius-sm);
  }

  .btn-danger-sm {
    background: transparent;
    border: none;
    color: var(--text3);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    font-size: 16px;
    transition: color .12s;
  }

  .btn-danger-sm:hover { color: var(--danger); }

  .btn-full { width: 100%; justify-content: center; }

  /* Member list */
  .member-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 7px;
    background: var(--surface2);
  }

  .member-name { display: flex; align-items: center; gap: 8px; font-size: 14px; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }

  /* Entry table */
  .entry-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .entry-table th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: 6px 8px 10px;
    border-bottom: 1px solid var(--border);
  }

  .entry-table td { padding: 11px 8px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .entry-table tr:last-child td { border-bottom: none; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
  }

  .badge-payer { background: var(--warning-bg); color: var(--warning); }
  .badge-splitter { background: var(--surface2); color: var(--text2); margin: 2px; }

  /* Settle */
  .settle-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 13px 0;
    border-bottom: 1px solid var(--border);
  }

  .settle-item:last-child { border-bottom: none; }

  .settle-from { font-weight: 500; }
  .settle-arrow { color: var(--text3); margin: 0 8px; font-size: 18px; }
  .settle-to { font-weight: 500; color: var(--accent); }
  .settle-amount { font-size: 17px; font-weight: 600; color: var(--danger); }

  .personal-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 8px;
  }

  .personal-row:last-child { border-bottom: none; }

  .personal-stats { display: flex; gap: 14px; font-size: 13px; flex-wrap: wrap; }
  .personal-stat-item { color: var(--text2); }
  .personal-stat-item strong { color: var(--text); }

  .net-pos { color: #16a34a; font-weight: 600; }
  .net-neg { color: var(--danger); font-weight: 600; }
  .net-zero { color: var(--text3); font-weight: 500; }

  /* Feedback */
  .msg {
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }

  .msg.show { display: block; }
  .msg-success { background: var(--accent-bg); color: var(--accent-text); }
  .msg-error { background: var(--danger-bg); color: var(--danger); }

  .empty-state {
    text-align: center;
    padding: 2.5rem;
    color: var(--text3);
  }

  .empty-state i { font-size: 32px; display: block; margin-bottom: 8px; }
  .empty-state p { font-size: 14px; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 1rem 0; }

  /* Add member row */
  .add-member-row { display: flex; gap: 8px; margin-bottom: 1rem; }
  .add-member-row input { flex: 1; margin: 0; }

  /* Settled banner */
  .settled-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    background: var(--accent-bg);
    border-radius: var(--radius-sm);
    color: var(--accent-text);
    font-weight: 500;
    font-size: 14px;
  }

  .section-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .07em;
    padding: 0 0 8px;
    margin: 0 0 8px;
    border-bottom: 1px solid var(--border);
  }

  .paid-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 0;
    border-bottom: 1px solid var(--border);
  }

  .paid-item:last-child { border-bottom: none; }

  .paid-left { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }

  .paid-names { font-size: 14px; opacity: 0.5; }

  .paid-badge {
    font-size: 11px;
    font-weight: 600;
    background: var(--accent-bg);
    color: var(--accent-text);
    padding: 2px 8px;
    border-radius: 20px;
  }

  .paid-amount { font-size: 14px; opacity: 0.4; text-decoration: line-through; margin-right: 8px; }

  .btn-undo {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text3);
    cursor: pointer;
    padding: 4px 10px;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-family: inherit;
    transition: all .12s;
    white-space: nowrap;
  }

  .btn-undo:hover { color: var(--text); background: var(--surface2); }

  .history-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    padding: 12px 0 4px;
    color: var(--text3);
    font-size: 13px;
    user-select: none;
    border-top: 1px solid var(--border);
    margin-top: 8px;
  }

  .history-toggle:hover { color: var(--text2); }

  .round-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 1rem;
    overflow: hidden;
  }

  .round-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 1.25rem;
    cursor: pointer;
    user-select: none;
    background: var(--surface2);
  }

  .round-header:hover { background: var(--surface); }

  .round-title { font-weight: 600; font-size: 15px; }
  .round-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }

  .round-badge {
    font-size: 11px;
    font-weight: 600;
    background: var(--accent-bg);
    color: var(--accent-text);
    padding: 3px 10px;
    border-radius: 20px;
  }

  .round-body { padding: 0 1.25rem; display: none; }
  .round-body.open { display: block; }

  .round-entry-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .round-entry-row:last-child { border-bottom: none; }

  .settled-banner i { font-size: 20px; }

  /* Export btn */
  .export-row {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 1rem;
  }

  @media (max-width: 500px) {
    .form-row, .form-row3 { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: 1fr 1fr; }
    .tabs { flex-wrap: wrap; }
    .tab { flex: none; min-width: 48%; }
    .entry-table .hide-mobile { display: none; }
    .personal-stats { flex-direction: column; gap: 4px; }
  }

  select option { background: var(--surface); color: var(--text); }

  .category-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border: 1px solid var(--border2);
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    user-select: none;
    background: var(--surface2);
    color: var(--text2);
    transition: all .12s;
  }

  .category-pill.active {
    background: #fff2ee;
    border-color: #ff4a00;
    color: #c43600;
    font-weight: 500;
  }

  @media (prefers-color-scheme: dark) {
    .category-pill.active {
      background: #2e1a10;
      border-color: #ff6a30;
      color: #ff9070;
    }
  }

  .season-row {
    margin-top: 10px;
    display: none;
  }

  .season-row.show { display: block; }

  .add-cat-row { display: flex; gap: 8px; margin-top: 10px; }
  .add-cat-row input { flex: 1; margin: 0; }

  /* Custom select arrow */
  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '\ea99';
    font-family: 'tabler-icons';
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    color: var(--text3);
    font-size: 15px;
  }

  .select-wrap select { padding-right: 32px; }
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, push, remove, update }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDDQoXLaCv_RYyqxRkW0VYZwj-s3FdnPAQ",
    authDomain: "clap-ledger.firebaseapp.com",
    databaseURL: "https://clap-ledger-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "clap-ledger",
    storageBucket: "clap-ledger.firebasestorage.app",
    messagingSenderId: "681138639340",
    appId: "1:681138639340:web:4eaaa0655187ea3f1c70c9",
    measurementId: "G-3V5JKY7TK1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // 把 firebase 方法掛到 window，讓後面的 script 可以用
  window._fb = { db, ref, onValue, set, push, remove, update };
  window.dispatchEvent(new Event('firebase-ready'));
</script>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="logo">

      Clap 記帳本
    </div>
    <div class="header-actions">
      <button class="btn btn-sm" onclick="exportCSV()" title="匯出 CSV">
        ↓ 匯出
      </button>
      <button class="btn btn-sm" onclick="clearAll()" title="清除全部資料" style="color:var(--danger)">
        
      </button>
    </div>
  </div>
</header>

<main class="main">
  <div id="loading-banner" style="text-align:center;padding:2rem;color:var(--text3);font-size:14px">
    ⏳ 連線中，請稍候…
  </div>
  <div id="app-content" style="display:none">

  <div class="tabs">
    <div class="tab active" id="tab-setup" onclick="switchTab('setup')">
       成員
    </div>
    <div class="tab" id="tab-add" onclick="switchTab('add')">
      + 記帳
    </div>
    <div class="tab" id="tab-records" onclick="switchTab('records')">
       記錄
    </div>
    <div class="tab" id="tab-settle" onclick="switchTab('settle')">
       結算
    </div>
    <div class="tab" id="tab-history" onclick="switchTab('history')">
      ✓ 已結款
    </div>
  </div>

  <!-- 成員設定 -->
  <div id="pane-setup">
    <div class="card">
      <div class="card-title"> 群組成員</div>
      <div class="add-member-row">
        <input type="text" id="new-member" placeholder="輸入成員名稱" maxlength="20"
          onkeydown="if(event.key==='Enter')addMember()" />
        <button class="btn btn-primary" onclick="addMember()">
          + 新增
        </button>
      </div>
      <div id="member-list"></div>
      <hr class="divider">
      <button class="btn btn-primary btn-full" onclick="switchTab('add')">
        開始記帳 →
      </button>
    </div>
  </div>

  <!-- 新增支出 -->
  <div id="pane-add" style="display:none">
    <div id="lock-overlay" style="display:none" class="card" style="text-align:center;padding:2.5rem 1.25rem">
      <div style="text-align:center;padding:2rem 1rem">
        <div style="font-size:32px;margin-bottom:12px">🔒</div>
        <div style="font-size:16px;font-weight:500;margin-bottom:8px">結算進行中</div>
        <div style="font-size:13px;color:var(--text2);line-height:1.7">有人已開始匯款，記帳暫時鎖定。<br>待所有款項結清封存後，即可繼續記帳。</div>
        <div style="margin-top:1.25rem">
          <button class="btn btn-primary" onclick="switchTab('settle')">前往結算頁 →</button>
        </div>
      </div>
    </div>
    <div id="add-form-inner">
    <div class="card">
      <div class="card-title"> 新增支出</div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">日期</label>
          <input type="date" id="f-date" />
        </div>
        <div class="form-group">
          <label class="form-label">代墊者</label>
          <div class="select-wrap">
            <select id="f-payer"></select>
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">名目 / 說明</label>
          <input type="text" id="f-desc" placeholder="例：晚餐、計程車、住宿…" maxlength="40" />
        </div>
        <div class="form-group">
          <label class="form-label">金額（NT$）</label>
          <input type="number" id="f-amount" placeholder="0" min="0" step="1" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">類別</label>
        <div class="chips" id="cat-chips" style="margin-bottom:6px"></div>
        <div class="season-row" id="season-row">
          <label class="form-label">季別</label>
          <div class="select-wrap">
            <select id="f-season">
              <option value="">選擇季別</option>
              <option>第二季</option><option>第三季</option><option>第四季</option>
              <option>第五季</option><option>第六季</option><option>第七季</option>
              <option>第八季</option><option>第九季</option><option>第十季</option>
            </select>
          </div>
        </div>
        <div class="add-cat-row">
          <input type="text" id="new-cat" placeholder="新增類別…" maxlength="20"
            onkeydown="if(event.key==='Enter')addCategory()" />
          <button class="btn btn-sm" onclick="addCategory()">+ 新增</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">分帳人（可複選）</label>
        <div class="chips" id="split-chips"></div>
      </div>

      <button class="btn btn-primary btn-full" onclick="addEntry()" style="margin-top:6px">
        ✓ 記錄這筆
      </button>
      <div class="msg" id="add-msg"></div>
    </div>
    </div>
  </div>

  <!-- 帳單記錄 -->
  <div id="pane-records" style="display:none">
    <div class="stats-row" id="stats-records"></div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <div class="card-title" style="margin:0"> 支出清單</div>
        <div style="display:flex;gap:6px;align-items:center">
          <label style="font-size:12px;color:var(--text3)">篩選</label>
          <div class="select-wrap">

      </div>

    </div>

  <!-- 結算 -->

    <div class="card">
      <div class="card-title"> 轉帳清單</div>
      <div id="settle-list"></div>
    </div>
    <div class="card">
      <div class="card-title"> 個人帳務明細</div>

  <!-- 已結款 -->

<script>
// ─── Firebase State ────────────────────────────────────────
let state = { members: [], entries: [], paidTransfers: [], archivedRounds: [], categories: ['出遊','軟體訂閱','錄音'], avatarColors: {}, locked: false };
let fbReady = false;

function saveState() {
  if (!fbReady) return;
  const { db, ref, set } = window._fb;
  set(ref(db, 'ledger'), JSON.parse(JSON.stringify(state)));
}

function initFirebase() {
  const { db, ref, onValue } = window._fb;
  fbReady = true;
  onValue(ref(db, 'ledger'), (snapshot) => {
    const data = snapshot.val();
    if (data) {
      state = {
        members: data.members || [],
        entries: data.entries || [],
        paidTransfers: data.paidTransfers || [],
        archivedRounds: data.archivedRounds || [],
        categories: data.categories || ['出遊','軟體訂閱','錄音'],
        avatarColors: data.avatarColors || {},
        locked: data.locked || false
      };
    } else {
      state = { members: [], entries: [], paidTransfers: [], archivedRounds: [], categories: ['出遊','軟體訂閱','錄音'], avatarColors: {}, locked: false };
    }
    // 第一次載入：隱藏 loading，顯示內容
    const loading = document.getElementById('loading-banner');
    const content = document.getElementById('app-content');
    if (loading) loading.style.display = 'none';
    if (content) content.style.display = 'block';
    // 重新渲染目前的 tab
    const activeTab = document.querySelector('.tab.active');
    const tabName = activeTab ? activeTab.id.replace('tab-','') : 'setup';
    refreshCurrentTab(tabName);
  }, (error) => {
    // 連線失敗
    const loading = document.getElementById('loading-banner');
    if (loading) loading.innerHTML = '❌ 連線失敗，請重新整理頁面。<br><small style="color:var(--text3)">若持續發生，請確認網路連線或 Firebase 規則是否過期。</small>';
  });
}

function refreshCurrentTab(name) {
  updateLockUI();
  if (name === 'setup') renderMemberList();
  if (name === 'add') renderAddPane();
  if (name === 'records') renderRecords();
  if (name === 'settle') renderSettle();
  if (name === 'history') renderHistory();
}

function updateLockUI() {
  const locked = state.locked;
  const addTab = document.getElementById('tab-add');
  if (addTab) {
    addTab.style.opacity = locked ? '0.4' : '1';
    addTab.title = locked ? '結算進行中，暫停記帳' : '';
  }
}

function renderAddPane() {
  const locked = state.locked;
  const overlay = document.getElementById('lock-overlay');
  const form = document.getElementById('add-form-inner');
  if (overlay) overlay.style.display = locked ? 'block' : 'none';
  if (form) form.style.display = locked ? 'none' : 'block';
  if (!locked) {
    renderPayerSelect();
    renderSplitChips();
    renderCatChips();
  }
}

window.addEventListener('firebase-ready', () => {
  initFirebase();
});

// ─── Avatar Colors ─────────────────────────────────────────
const AVATAR_PALETTE = [
  {bg:'#ffe5d9',text:'#b83200'},
  {bg:'#d9f0ff',text:'#0058a3'},
  {bg:'#d9ffe9',text:'#006630'},
  {bg:'#f5d9ff',text:'#6600aa'},
  {bg:'#fff9d9',text:'#806600'},
  {bg:'#ffd9f0',text:'#aa0066'},
  {bg:'#d9fff5',text:'#006655'},
  {bg:'#e8d9ff',text:'#7a2200'},
  {bg:'#e5d9ff',text:'#3300aa'},
  {bg:'#d9f5ff',text:'#005580'},
];

function getMemberColor(name) {
  if (!state.avatarColors) state.avatarColors = {};
  if (!state.avatarColors[name]) {
    const used = Object.values(state.avatarColors).map(c=>c.bg);
    const fresh = AVATAR_PALETTE.filter(c => !used.includes(c.bg));
    const pick = fresh.length > 0
      ? fresh[Math.floor(Math.random() * fresh.length)]
      : AVATAR_PALETTE[Object.keys(state.avatarColors).length % AVATAR_PALETTE.length];
    state.avatarColors[name] = pick;
    saveState();
  }
  return state.avatarColors[name];
}

function avatarHtml(name) {
  const c = getMemberColor(name);
  return `<div class="avatar" style="background:${c.bg};color:${c.text}">${esc(name).slice(0,1)}</div>`;
}

// ─── Tab ───────────────────────────────────────
function switchTab(name) {
  ['setup','add','records','settle','history'].forEach(t => {
    document.getElementById('pane-'+t).style.display = t === name ? '' : 'none';
    document.getElementById('tab-'+t).classList.toggle('active', t === name);
  });
  if (name === 'add') renderAddPane();
  if (name === 'records') renderRecords();
  if (name === 'settle') renderSettle();
  if (name === 'history') renderHistory();
}

// ─── Members ───────────────────────────────────
function addMember() {
  const inp = document.getElementById('new-member');
  const name = inp.value.trim();
  if (!name) return;
  if (state.members.includes(name)) { showMsg('add-msg', `「${name}」已存在`, 'error'); return; }
  state.members.push(name);
  inp.value = '';
  saveState();
  renderMemberList();
  renderPayerSelect();
  renderSplitChips();
}

function removeMember(name) {
  state.members = state.members.filter(m => m !== name);
  saveState();
  renderMemberList();
  renderPayerSelect();
  renderSplitChips();
}

function renderMemberList() {
  const el = document.getElementById('member-list');
  if (state.members.length === 0) {
    el.innerHTML = '<div class="empty-state"><p>還沒有成員，新增第一位吧</p></div>';
    return;
  }
  el.innerHTML = state.members.map(m => `
    <div class="member-item">
      <div class="member-name">
        ${avatarHtml(m)}
        <span>${esc(m)}</span>
      </div>
      <button class="btn-danger-sm" onclick="removeMember('${esc(m)}')" title="移除">×</button>
    </div>
  `).join('');
}

// ─── Add Entry ──────────────────────────────────
function renderPayerSelect() {
  const sel = document.getElementById('f-payer');
  const cur = sel.value;
  sel.innerHTML = state.members.map(m =>
    `<option value="${esc(m)}" ${m===cur?'selected':''}>${esc(m)}</option>`
  ).join('');
}

function renderSplitChips() {
  const el = document.getElementById('split-chips');
  if (state.members.length === 0) {
    el.innerHTML = '<span style="font-size:13px;color:var(--text3)">請先在「成員」頁面新增成員</span>';
    return;
  }
  el.innerHTML = state.members.map(m => `
    <div class="chip active" data-member="${esc(m)}" onclick="toggleChip(this)">
      <span class="chip-icon">✓</span> ${esc(m)}
    </div>
  `).join('');
}

function toggleChip(el) {
  el.classList.toggle('active');
  el.querySelector('.chip-icon').textContent = el.classList.contains('active') ? '✓' : '–';
}

// ─── Categories ────────────────────────────────────────────
function renderCatChips() {
  const el = document.getElementById('cat-chips');
  if (!el) return;
  if (!state.categories) state.categories = ['出遊','軟體訂閱','錄音'];
  el.innerHTML = state.categories.map((c) => `
    <div class="category-pill" data-cat="${esc(c)}" onclick="selectCat(this,'${esc(c)}')">
      ${esc(c)}
      <span onclick="event.stopPropagation();deleteCategory('${esc(c)}')"
        style="margin-left:4px;opacity:0.5;font-size:12px;line-height:1;cursor:pointer;font-weight:700"
        onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.5'">×</span>
    </div>
  `).join('');
}

function deleteCategory(name) {
  state.categories = (state.categories || []).filter(c => c !== name);
  saveState();
  renderCatChips();
  // 如果刪的是「錄音」，收起季別
  const seasonRow = document.getElementById('season-row');
  if (name === '錄音' && seasonRow) seasonRow.classList.remove('show');
}

function selectCat(el, cat) {
  document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  const seasonRow = document.getElementById('season-row');
  if (seasonRow) seasonRow.classList.toggle('show', cat === '錄音');
}

function addCategory() {
  const inp = document.getElementById('new-cat');
  const name = inp.value.trim();
  if (!name) return;
  if (!state.categories) state.categories = [];
  if (state.categories.includes(name)) return;
  state.categories.push(name);
  inp.value = '';
  saveState();
  renderCatChips();
}

function getSelectedCat() {
  const active = document.querySelector('.category-pill.active');
  return active ? active.dataset.cat : '';
}

function getSelectedSeason() {
  const sel = document.getElementById('f-season');
  return sel ? sel.value : '';
}

function addEntry() {
  if (state.locked) { showMsg('add-msg','結算進行中，無法新增帳務','error'); return; }
  const date = document.getElementById('f-date').value;
  const payer = document.getElementById('f-payer').value;
  const desc = document.getElementById('f-desc').value.trim();
  const amount = parseFloat(document.getElementById('f-amount').value);
  const active = document.querySelectorAll('#split-chips .chip.active');
  const splitters = Array.from(active).map(c => c.dataset.member);

  if (!date) { showMsg('add-msg','請填寫日期','error'); return; }
  if (!payer) { showMsg('add-msg','請選擇代墊者','error'); return; }
  if (!desc) { showMsg('add-msg','請填寫名目','error'); return; }
  if (isNaN(amount) || amount <= 0) { showMsg('add-msg','請輸入有效金額','error'); return; }
  if (splitters.length === 0) { showMsg('add-msg','請至少勾選一位分帳人','error'); return; }

  const category = getSelectedCat();
  const season = category === '錄音' ? getSelectedSeason() : '';
  state.entries.push({ id: Date.now(), date, payer, desc, amount, splitters, category, season });
  saveState();

  document.getElementById('f-desc').value = '';
  document.getElementById('f-amount').value = '';
  renderSplitChips();
  renderCatChips();
  showMsg('add-msg','✓ 已記錄！','success');
}

// ─── Records ────────────────────────────────────
function renderRecords() {
  const total = state.entries.reduce((s,e) => s+e.amount, 0);
  const perPerson = state.members.length > 0 ? total / state.members.length : 0;

  document.getElementById('stats-records').innerHTML = `
    <div class="stat-card"><div class="stat-label">總支出</div><div class="stat-value">NT$${fmt(total)}</div></div>
    <div class="stat-card"><div class="stat-label">筆數</div><div class="stat-value">${state.entries.length}</div></div>
    <div class="stat-card"><div class="stat-label">人均消費</div><div class="stat-value">NT$${fmt(perPerson)}</div></div>
  `;

  const fp = document.getElementById('filter-payer');
  const cur = fp.value;
  fp.innerHTML = '<option value="">全部成員</option>' +
    state.members.map(m => `<option value="${esc(m)}" ${m===cur?'selected':''}>${esc(m)}</option>`).join('');

  const payer = fp.value;
  const list = [...state.entries]
    .filter(e => !payer || e.payer === payer)
    .sort((a,b) => b.date.localeCompare(a.date));

  const el = document.getElementById('entry-list');
  if (list.length === 0) {
    el.innerHTML = '<div class="empty-state"><p>還沒有任何記錄</p></div>';
    return;
  }

  el.innerHTML = `
    <table class="entry-table">
      <thead>
        <tr>
          <th>日期</th>
          <th class="hide-mobile">名目</th>
          <th class="hide-mobile">類別</th>
          <th>代墊</th>
          <th>金額</th>
          <th class="hide-mobile">分帳人</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${list.map(e => `
          <tr>
            <td style="color:var(--text2);white-space:nowrap">${e.date.slice(5)}</td>
            <td class="hide-mobile" style="font-weight:500">${esc(e.desc)}</td>
            <td class="hide-mobile"><span class="badge badge-splitter">${esc(e.category||'—')}${e.season?' · '+esc(e.season):''}</span></td>
            <td><span class="badge badge-payer">${esc(e.payer)}</span></td>
            <td style="font-weight:600;white-space:nowrap">NT$${fmt(e.amount)}</td>
            <td class="hide-mobile">${e.splitters.map(s=>`<span class="badge badge-splitter">${esc(s)}</span>`).join('')}</td>
            <td>
              <button class="btn-danger-sm" onclick="removeEntry(${e.id})" title="刪除">🗑</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function removeEntry(id) {
  state.entries = state.entries.filter(e => e.id !== id);
  saveState();
  renderRecords();
}

// ─── Settle ─────────────────────────────────────
function calcBalance() {
  const bal = {};
  state.members.forEach(m => bal[m] = 0);
  state.entries.forEach(e => {
    const share = e.amount / e.splitters.length;
    if (bal[e.payer] !== undefined) bal[e.payer] += e.amount;
    e.splitters.forEach(s => { if (bal[s] !== undefined) bal[s] -= share; });
  });
  return bal;
}

function simplifyDebts(bal) {
  const pos = [], neg = [];
  Object.entries(bal).forEach(([m,b]) => {
    if (b > 0.009) pos.push({m, b: +b.toFixed(2)});
    else if (b < -0.009) neg.push({m, b: +(-b).toFixed(2)});
  });
  // 由大到小排序，確保每次配對結果穩定
  pos.sort((a,b) => b.b - a.b);
  neg.sort((a,b) => b.b - a.b);
  const txns = [];
  let pi = 0, ni = 0;
  const p = pos.map(x=>({...x})), n = neg.map(x=>({...x}));
  while (pi < p.length && ni < n.length) {
    const pay = Math.min(p[pi].b, n[ni].b);
    if (pay > 0.009) txns.push({ from: n[ni].m, to: p[pi].m, amount: +pay.toFixed(0) });
    p[pi].b -= pay; n[ni].b -= pay;
    if (p[pi].b < 0.009) pi++;
    if (n[ni].b < 0.009) ni++;
  }
  return txns;
}

function calcPendingTxns() {
  const bal = calcBalance();
  const allTxns = simplifyDebts(bal);
  const paid = [...(state.paidTransfers || [])];
  const pending = [];
  allTxns.forEach(t => {
    const idx = paid.findIndex(p => p.from === t.from && p.to === t.to);
    if (idx >= 0) paid.splice(idx, 1);
    else pending.push(t);
  });
  return pending;
}

function renderSettle() {
  if (!state.paidTransfers) state.paidTransfers = [];
  const total = state.entries.reduce((s,e) => s+e.amount, 0);
  const perPerson = state.members.length > 0 ? total / state.members.length : 0;
  const bal = calcBalance();
  const txns = calcPendingTxns();
  const paidCount = state.paidTransfers.length;
  const allDone = state.entries.length > 0 && txns.length === 0;

  document.getElementById('stats-settle').innerHTML = `
    <div class="stat-card"><div class="stat-label">本輪總支出</div><div class="stat-value">NT$${fmt(total)}</div></div>
    <div class="stat-card"><div class="stat-label">待結款</div><div class="stat-value" style="color:${txns.length>0?'var(--danger)':'var(--accent)'}">` +
      (txns.length > 0 ? `${txns.length} 筆` : '✓ 結清') +
    `</div></div>
    <div class="stat-card"><div class="stat-label">已匯款</div><div class="stat-value" style="color:var(--accent)">${paidCount} 筆</div></div>
  `;

  const sl = document.getElementById('settle-list');
  if (state.entries.length === 0) {
    sl.innerHTML = '<div class="empty-state"><p>尚無帳務資料，請先在「記帳」頁面新增支出</p></div>';
  } else if (allDone) {
    sl.innerHTML = `
      <div class="settled-banner" style="margin-bottom:1rem">✓ 所有款項皆已結清！</div>
      <div id="archive-confirm" style="display:none;margin-top:4px;padding:14px;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border2)">
        <p style="font-size:13px;color:var(--text2);margin-bottom:10px">封存後，目前的帳務記錄會清空，成員保留，可以開始下一輪。確定嗎？</p>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" style="flex:1" onclick="archiveRound()">確定封存</button>
          <button class="btn" style="flex:1" onclick="document.getElementById('archive-confirm').style.display='none';document.getElementById('archive-btn').style.display='flex'">取消</button>
        </div>
      </div>
      <button id="archive-btn" class="btn btn-primary btn-full" onclick="document.getElementById('archive-confirm').style.display='block';this.style.display='none'" style="margin-top:4px">
        將這輪帳務封存到「已結款」→
      </button>
    `;
  } else {
    let h = '';
    if (txns.length > 0) {
      h += `<div class="section-label">待結款</div>`;
      h += txns.map((t,i) => `
        <div class="settle-item">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span class="settle-from">${esc(t.from)}</span>
            <span style="color:var(--text3)">→</span>
            <span class="settle-to">${esc(t.to)}</span>
          </div>
          <div style="display:flex;align-items:center;gap:10px">
            <span class="settle-amount">NT$${fmt(t.amount)}</span>
            <button class="btn-sm btn-primary" onclick="markPaid(${i})" style="white-space:nowrap;font-size:12px;padding:5px 12px">✓ 已匯款</button>
          </div>
        </div>
      `).join('');
    }
    if (paidCount > 0) {
      h += `<div class="section-label" style="margin-top:${txns.length?'1rem':'0'}">已匯款（${paidCount} 筆）</div>`;
      h += state.paidTransfers.map((t,i) => `
        <div class="paid-item">
          <div class="paid-left">
            <span class="paid-names">${esc(t.from)} → ${esc(t.to)}</span>
            <span class="paid-badge">✓ 已匯款</span>
            <span style="font-size:12px;color:var(--text3)">${t.date||''}</span>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="paid-amount">NT$${fmt(t.amount)}</span>
            <button class="btn-undo" onclick="undoPaid(${i})">復原</button>
          </div>
        </div>
      `).join('');
    }
    sl.innerHTML = h;
  }

  const pd = document.getElementById('personal-detail');
  pd.innerHTML = state.members.map(m => {
    const totalPaid = state.entries.filter(e=>e.payer===m).reduce((s,e)=>s+e.amount,0);
    const owed = state.entries.filter(e=>e.splitters.includes(m)).reduce((s,e)=>s+e.amount/e.splitters.length,0);
    const net = bal[m] || 0;
    const netClass = net > 0.009 ? 'net-pos' : net < -0.009 ? 'net-neg' : 'net-zero';
    const netLabel = net > 0.009 ? `應收 NT$${fmt(net)}` : net < -0.009 ? `應付 NT$${fmt(-net)}` : '✓ 結清';
    return `
      <div class="personal-row">
        <div style="display:flex;align-items:center;gap:8px;font-weight:500">
          ${avatarHtml(m)} ${esc(m)}
        </div>
        <div class="personal-stats">
          <div class="personal-stat-item">代墊 <strong>NT$${fmt(totalPaid)}</strong></div>
          <div class="personal-stat-item">應付 <strong>NT$${fmt(owed)}</strong></div>
          <div class="${netClass}">${netLabel}</div>
        </div>
      </div>
    `;
  }).join('');
}

function markPaid(idx) {
  if (!state.paidTransfers) state.paidTransfers = [];
  const txns = calcPendingTxns();
  if (!txns[idx]) return;
  const t = {...txns[idx]};
  t.date = new Date().toLocaleDateString('zh-TW');
  state.paidTransfers.push(t);
  state.locked = true;  // 第一筆匯款開始 → 鎖定記帳
  saveState();
  renderSettle();
  updateLockUI();
}

function undoPaid(idx) {
  if (!state.paidTransfers) return;
  state.paidTransfers.splice(idx, 1);
  if (state.paidTransfers.length === 0) state.locked = false;  // 全部復原 → 解鎖
  saveState();
  renderSettle();
  updateLockUI();
}

function archiveRound() {
  if (!state.archivedRounds) state.archivedRounds = [];
  const roundDate = new Date().toLocaleDateString('zh-TW');
  const total = state.entries.reduce((s,e)=>s+e.amount,0);
  state.archivedRounds.push({
    id: Date.now(),
    date: roundDate,
    total,
    members: [...state.members],
    entries: [...state.entries],
    transfers: [...(state.paidTransfers||[])]
  });
  state.entries = [];
  state.paidTransfers = [];
  state.locked = false;  // 封存完成 → 解鎖
  saveState();
  renderSettle();
  updateLockUI();
}

function renderHistory() {
  if (!state.archivedRounds) state.archivedRounds = [];
  const rounds = [...state.archivedRounds].reverse();
  const totalArchived = rounds.reduce((s,r)=>s+r.total,0);

  document.getElementById('stats-history').innerHTML = `
    <div class="stat-card"><div class="stat-label">歷史輪數</div><div class="stat-value">${rounds.length}</div></div>
    <div class="stat-card"><div class="stat-label">歷史總支出</div><div class="stat-value">NT$${fmt(totalArchived)}</div></div>
    <div class="stat-card"><div class="stat-label">成員數</div><div class="stat-value">${state.members.length}</div></div>
  `;

  const el = document.getElementById('history-rounds');
  if (rounds.length === 0) {
    el.innerHTML = '<div class="empty-state" style="padding:3rem;text-align:center;color:var(--text3)"><p style="font-size:14px">還沒有封存的帳務<br>完成一輪結算後點「封存」即可歸檔</p></div>';
    return;
  }

  el.innerHTML = rounds.map((r,ri) => {
    const realIdx = rounds.length - 1 - ri;
    return `
    <div class="round-card">
      <div class="round-header" onclick="toggleRound(${r.id})">
        <div>
          <div class="round-title">第 ${realIdx+1} 輪帳務</div>
          <div class="round-meta">${r.date} ・ ${r.entries.length} 筆・${r.members.join('、')}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-weight:600;font-size:15px">NT$${fmt(r.total)}</span>
          <span class="round-badge">✓ 已結款</span>
        </div>
      </div>
      <div class="round-body" id="round-body-${r.id}">
        <div style="padding:10px 0 4px;font-size:12px;font-weight:600;color:var(--text3);letter-spacing:.05em;text-transform:uppercase">支出明細</div>
        ${r.entries.map(e=>`
          <div class="round-entry-row">
            <span style="color:var(--text2)">${e.date.slice(5)}</span>
            <span style="font-weight:500;flex:1;padding:0 10px">${esc(e.desc)}</span>
            <span class="badge badge-payer" style="margin-right:8px">${esc(e.payer)}</span>
            <span style="font-weight:600">NT$${fmt(e.amount)}</span>
          </div>
        `).join('')}
        <div style="padding:12px 0 4px;font-size:12px;font-weight:600;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;border-top:1px solid var(--border);margin-top:4px">轉帳記錄</div>
        ${r.transfers.map(t=>`
          <div class="round-entry-row">
            <span style="font-weight:500">${esc(t.from)}</span>
            <span style="color:var(--text3);margin:0 6px">→</span>
            <span style="font-weight:500;color:var(--accent);flex:1">${esc(t.to)}</span>
            <span class="paid-badge" style="margin-right:8px">✓ 已匯款</span>
            <span style="font-weight:600">NT$${fmt(t.amount)}</span>
          </div>
        `).join('')}
        <div style="padding:10px 0 14px;display:flex;justify-content:flex-end">
          <button class="btn-undo" onclick="deleteRound(${r.id})" style="color:var(--danger);border-color:var(--danger)">刪除這輪記錄</button>
        </div>
      </div>
    </div>
  `}).join('');
}

function toggleRound(id) {
  const body = document.getElementById('round-body-'+id);
  if (body) body.classList.toggle('open');
}

function deleteRound(id) {
  state.archivedRounds = (state.archivedRounds||[]).filter(r=>r.id!==id);
  saveState();
  renderHistory();
}

// ─── Export ─────────────────────────────────────
function exportCSV() {
  if (state.entries.length === 0) { alert('沒有資料可以匯出'); return; }
  const rows = [['日期','代墊者','名目','金額','類別','季別','分帳人']];
  [...state.entries].sort((a,b)=>a.date.localeCompare(b.date)).forEach(e => {
    rows.push([e.date, e.payer, e.desc, e.amount, e.category||'', e.season||'', e.splitters.join('/')]);
  });
  const csv = '\uFEFF' + rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const uri = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  const a = document.createElement('a');
  a.href = uri;
  a.download = `Clap記帳_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function clearAll() {
  state = { members: [], entries: [], paidTransfers: [], archivedRounds: [], categories: ['出遊','軟體訂閱','錄音'], avatarColors: {}, locked: false };
  saveState();
  renderMemberList();
  switchTab('setup');
}

// ─── Utils ──────────────────────────────────────
function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg show msg-${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'msg', 3000);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmt(n) {
  return Math.round(n).toLocaleString('zh-TW');
}

// ─── Init ───────────────────────────────────────
document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
renderMemberList();
renderPayerSelect();
renderSplitChips();
renderCatChips();
updateLockUI();
</script>
</body>
